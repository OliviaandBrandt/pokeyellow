name: Build ROM

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code Files
      uses: actions/checkout@v4

    - name: Install System Utilities
      run: |
        sudo apt-get update
        sudo apt-get install -y make gcc git build-essential libpng-dev wget

    - name: Load Game Boy Compiler
      run: |
        wget https://github.com/gbdev/rgbds/releases/download/v0.7.0/rgbds-0.7.0_amd64.deb
        sudo dpkg -i rgbds-0.7.0_amd64.deb

    - name: Build Graphics Tools
      run: |
        make -C tools/

    - name: Assemble GBC ROM
      run: |
        make

    - name: Save Playable ROM File
      uses: actions/upload-artifact@v4
      with:
        name: pokeyellow-rom
        path: |
          *.gbc
          *.sym
            *.gbc
            *.sym
