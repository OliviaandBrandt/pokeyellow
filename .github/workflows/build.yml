name: Build pokeyellow

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # Step 1: Check out the repository
      - name: Checkout repository
        uses: actions/checkout@v4

      # Step 2: Install required system build tools
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y make build-essential pkg-config

      # Step 3: Set up RGBDS (The Game Boy compiler/assembler)
      - name: Set up RGBDS
        uses: gbdev/setup-rgbds@v1
        with:
          version: 'v0.5.2' # Pokeyellow typically builds best with v0.5.2 or v0.6.0 depending on your fork's age

      # Step 4: Build the ROM
      - name: Compile ROM
        run: |
          make clean
          make
